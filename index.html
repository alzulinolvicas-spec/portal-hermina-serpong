<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal RS Hermina Serpong</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#021b1b;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* ======================================
   HALAMAN COVER
====================================== */

#home{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#021b1b;
}

.stage{
    position:relative;

    width:100vw;
    height:56.25vw;

    max-height:100vh;
    max-width:177.78vh;
}

.stage img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* ======================================
   AREA KLIK MENU
====================================== */

.menu{
    position:absolute;
    z-index:10;

    border-radius:20px;

    cursor:pointer;

    transition:0.2s ease;
}

/* EFEK HOVER */

.menu:hover{

    background:rgba(0,255,200,0.08);

    border:2px solid rgba(0,255,200,0.75);

    box-shadow:
    inset 0 0 18px rgba(0,255,200,0.18),
    0 0 12px rgba(0,255,200,0.35);

}

/* ======================================
   POSISI MENU (SUDAH DISESUAIKAN)
====================================== */

/* RINGKASAN EKSEKUTIF */
#btn-ringkasan{
    left:1.55%;
    top:67.65%;
    width:13.6%;
    height:14.1%;
}

/* KINERJA KEUANGAN */
#btn-keuangan{
    left:16.15%;
    top:67.65%;
    width:15.3%;
    height:14.1%;
}

/* IGD PADMA */
#btn-igd{
    left:32.1%;
    top:67.65%;
    width:11.9%;
    height:14.1%;
}

/* TINDAKAN PADMA */
#btn-tindakan{
    left:45%;
    top:67.65%;
    width:12.9%;
    height:14.1%;
}

/* PERSALINAN PADMA */
#btn-persalinan{
    left:58.7%;
    top:67.65%;
    width:11.9%;
    height:14.1%;
}

/* PADMA ANALYSIS */
#btn-padma{
    left:71.5%;
    top:67.65%;
    width:10.6%;
    height:14.1%;
}

/* EXECUTIVE SUMMARY */
#btn-executive{
    left:82.9%;
    top:67.65%;
    width:13%;
    height:14.1%;
}

/* ======================================
   HALAMAN SLIDE
====================================== */

.slide-page{
    display:none;
    width:100vw;
    height:100vh;
    background:#ffffff;
    position:relative;
}

.slide-page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* ======================================
   BUTTON KEMBALI
====================================== */

.back{
    position:fixed;
    top:20px;
    left:20px;

    z-index:999;

    background:#047857;
    color:white;

    border:none;
    border-radius:12px;

    padding:14px 24px;

    font-size:17px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0 4px 18px rgba(0,0,0,0.25);

    transition:0.2s;
}

.back:hover{
    background:#065f46;
    transform:translateY(-2px);
}

</style>
</head>

<body>

<!-- ======================================
     COVER DEPAN
====================================== -->

<section id="home">

<div class="stage">

<img src="cover-rs-hermina.png">

<!-- MENU -->

<div id="btn-ringkasan"
class="menu"
onclick="openSlide('ringkasan')"></div>

<div id="btn-keuangan"
class="menu"
onclick="openSlide('keuangan')"></div>

<div id="btn-igd"
class="menu"
onclick="openSlide('igd')"></div>

<div id="btn-tindakan"
class="menu"
onclick="openSlide('tindakan')"></div>

<div id="btn-persalinan"
class="menu"
onclick="openSlide('persalinan')"></div>

<div id="btn-padma"
class="menu"
onclick="openSlide('padma')"></div>

<div id="btn-executive"
class="menu"
onclick="openSlide('executive')"></div>

</div>

</section>

<!-- ======================================
     RINGKASAN EKSEKUTIF
====================================== -->

<section id="ringkasan" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="RINGKASAN EKSEKUTIF.png">

</section>

<!-- ======================================
     KINERJA KEUANGAN
====================================== -->

<section id="keuangan" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="KINERJA KEUANGAN & ANALISIS PADMA.png">

</section>

<!-- ======================================
     IGD PADMA
====================================== -->

<section id="igd" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="IGD PADMA.png">

</section>

<!-- ======================================
     TINDAKAN PADMA
====================================== -->

<section id="tindakan" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="TINDAKAN PADMA.png">

</section>

<!-- ======================================
     PERSALINAN PADMA
====================================== -->

<section id="persalinan" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="PERSALINAN PADMA.png">

</section>

<!-- ======================================
     PADMA ANALYSIS
====================================== -->

<section id="padma" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="PADMA ANALYSIS.png">

</section>

<!-- ======================================
     EXECUTIVE SUMMARY
====================================== -->

<section id="executive" class="slide-page">

<button class="back"
onclick="backHome()">
← Kembali
</button>

<img src="EXECUTIVE SUMMARY.png">

</section>

<!-- ======================================
     JAVASCRIPT
====================================== -->

<script>

function openSlide(id){

    document.getElementById("home").style.display = "none";

    const pages = [
        "ringkasan",
        "keuangan",
        "igd",
        "tindakan",
        "persalinan",
        "padma",
        "executive"
    ];

    pages.forEach(page => {
        document.getElementById(page).style.display = "none";
    });

    document.getElementById(id).style.display = "block";
}

function backHome(){

    const pages = [
        "ringkasan",
        "keuangan",
        "igd",
        "tindakan",
        "persalinan",
        "padma",
        "executive"
    ];

    pages.forEach(page => {
        document.getElementById(page).style.display = "none";
    });

    document.getElementById("home").style.display = "flex";
}

</script>

</body>
</html>
